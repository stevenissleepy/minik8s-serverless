# Serverless Serving CRD 聚合清单。
#
# 启动 serverless-controller / serverless-activator 前先 apply 这个文件。这里的 CustomResourceDefinition
# 会把 serverless.minik8s.io API 组注册到 apiserver，让用户可以创建
# ServerlessService、Revision、EventTrigger、EventSource 和 Workflow 这些自定义资源。

---
# ServerlessService 是面向用户的 Serving 资源。
# 它描述一个 serverless 服务，包括运行镜像、容器端口、环境变量、并发目标和
# scale-to-zero 配置。serverless-controller 会 watch 这个资源并调谐
# 对应的 Revision、Service 和 runtime Pod；serverless-activator 承接请求并发布扩缩容意图。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: serverlessservices.serverless.minik8s.io
spec:
  group: serverless.minik8s.io
  names:
    plural: serverlessservices
    singular: serverlessservice
    kind: ServerlessService
    shortNames:
      - sks
    categories:
      - serverless
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}

---
# Revision 记录 ServerlessService 模板生成出的具体版本。
# 当服务镜像或模板变化时，serverless-controller 会创建新的 Revision，并用这个 Revision
# 名称标记对应的 runtime 资源。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: revisions.serverless.minik8s.io
spec:
  group: serverless.minik8s.io
  names:
    plural: revisions
    singular: revision
    kind: Revision
    shortNames:
      - rev
    categories:
      - serverless
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      additionalPrinterColumns:
        - name: SERVICE
          type: string
          description: ServerlessService that owns this revision
          jsonPath: .spec.serviceName
        - name: READY
          type: boolean
          description: Whether this revision currently has ready runtime pods
          jsonPath: .status.ready
        - name: IMAGE
          type: string
          description: Container image used by this revision
          jsonPath: .spec.image
        - name: PORT
          type: integer
          description: Runtime container port
          jsonPath: .spec.port
        - name: AGE
          type: date
          jsonPath: .metadata.creationTimestamp
      subresources:
        status: {}

---
# EventTrigger 用于把某类事件绑定到函数或 Workflow 目标。
# 纯 HTTP Serving 不依赖它，但事件驱动测试需要通过 apiserver 创建 trigger 对象，
# 所以它也属于 serverless API 组。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: eventtriggers.serverless.minik8s.io
spec:
  group: serverless.minik8s.io
  names:
    plural: eventtriggers
    singular: eventtrigger
    kind: EventTrigger
    shortNames:
      - et
    categories:
      - serverless
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}

---
# EventSource 用于描述会自动产生事件的源。
# 当前支持定时 ping 事件和文件变化事件；serverless-activator 会 watch 这个资源，并把
# 产生的事件投递给匹配的 EventTrigger。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: eventsources.serverless.minik8s.io
spec:
  group: serverless.minik8s.io
  names:
    plural: eventsources
    singular: eventsource
    kind: EventSource
    shortNames:
      - es
    categories:
      - serverless
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}

---
# Workflow 描述函数调用链和分支步骤。
# 当收到 workflow 调用请求时，serverless-activator 会按步骤调用其中引用的 ServerlessService。
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: workflows.serverless.minik8s.io
spec:
  group: serverless.minik8s.io
  names:
    plural: workflows
    singular: workflow
    kind: Workflow
    shortNames:
      - wf
    categories:
      - serverless
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
