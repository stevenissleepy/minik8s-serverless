name: release-deb

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-deb-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-deb:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Release Tag
        id: release
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="$(awk -F\" '/^version = / { print $2; exit }' crates/kn/Cargo.toml)"
          arch="$(dpkg --print-architecture)"
          asset_prefix="${GITHUB_REPOSITORY#*/}-${tag}-linux-${arch}"
          {
            echo "tag=$tag"
            echo "version=$version"
            echo "arch=$arch"
            echo "asset_prefix=$asset_prefix"
          } >> "$GITHUB_OUTPUT"

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal

      - name: Build Debian Package
        shell: bash
        run: |
          set -euo pipefail
          cargo build --locked --release -p kn

          version="${{ steps.release.outputs.version }}"
          arch="${{ steps.release.outputs.arch }}"
          package="minik8s-serverless"
          build_dir="target/deb"
          package_root="${build_dir}/${package}"
          deb_path="${build_dir}/${package}_${version}_${arch}.deb"

          rm -rf "$package_root"
          mkdir -p \
            "$package_root/DEBIAN" \
            "$package_root/usr/local/bin"

          install -m 0755 target/release/kn "$package_root/usr/local/bin/kn"
          installed_size="$(du -sk "$package_root" | awk '{ print $1 }')"

          cat > "$package_root/DEBIAN/control" <<EOF
          Package: ${package}
          Version: ${version}
          Section: admin
          Priority: optional
          Architecture: ${arch}
          Maintainer: Minik8s Maintainers <minik8s@example.invalid>
          Depends: libc6
          Installed-Size: ${installed_size}
          Description: Serverless plugin for Minik8s
           Minik8s Serverless provides the kn command-line client for building,
           publishing and managing serverless functions on a Minik8s cluster.
          EOF

          dpkg-deb --build --root-owner-group "$package_root" "$deb_path"

      - name: Build Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/dist/minik8s-serverless
          install -m 0644 \
            "target/deb/minik8s-serverless_${{ steps.release.outputs.version }}_${{ steps.release.outputs.arch }}.deb" \
            "target/dist/${{ steps.release.outputs.asset_prefix }}.deb"
          install -m 0755 target/release/kn target/dist/minik8s-serverless/kn

          tar -C target/dist \
            -czf "target/dist/${{ steps.release.outputs.asset_prefix }}.tar.gz" \
            minik8s-serverless

      - name: Write Checksums
        shell: bash
        run: |
          sha256sum \
            "target/dist/${{ steps.release.outputs.asset_prefix }}.deb" \
            "target/dist/${{ steps.release.outputs.asset_prefix }}.tar.gz" \
            > target/dist/SHA256SUMS

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          title="${tag}"
          notes="Automated Minik8s Serverless release for ${tag}."
          files=(
            "target/dist/${{ steps.release.outputs.asset_prefix }}.deb"
            "target/dist/${{ steps.release.outputs.asset_prefix }}.tar.gz"
            "target/dist/SHA256SUMS"
          )

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" \
              --title "$title" \
              --notes "$notes"
            gh release upload "$tag" "${files[@]}" --clobber
          else
            gh release create "$tag" \
              --title "$title" \
              --notes "$notes" \
              "${files[@]}"
          fi
